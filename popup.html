<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Auto-Reply</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="icon.png" alt="Logo" class="logo-img">
        </div>
        
        <h1 class="app-title">Global Auto-Reply</h1>
        <p class="app-subtitle">Smart AI Auto-Commenter</p>
        
        <div class="status-card" style="margin-bottom: 12px;">
            <div class="status-info">
                <div class="status-indicator" id="status-dot"></div>
                <span id="status-text" style="font-weight: 700; font-size: 0.9rem;">Inactive</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-bot">
                <span class="slider round"></span>
            </label>
        </div>

        <div class="status-card">
            <div class="status-info">
                <span style="font-weight: 700; font-size: 0.9rem; color: #475569;">日本語のみ</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-jp">
                <span class="slider round"></span>
            </label>
        </div>

        <div class="form-group">
            <label for="api-key">Groq API Key</label>
            <input type="password" id="api-key" placeholder="gsk_...">
        </div>

        <button id="save-btn" class="btn-primary">Save Settings</button>
        <div id="message"></div>
        
    </div>
    <script src="popup.js"></script>
</body>
</html>
